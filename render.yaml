services:
  - type: web
    name: rag-chatbot-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      cp -r chroma_db /opt/render/project/src/backend/ 2>/dev/null || true
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GROQ_API_KEY
        sync: false